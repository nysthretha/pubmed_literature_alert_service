name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for credential patterns
        run: bash .githooks/scan-diff.sh

  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: scheduler/go.sum
      - name: Run Go tests (uses testcontainers-go for Postgres)
        working-directory: ./scheduler
        run: go test ./... -timeout 10m

  python-check:
    name: Python sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml
      - name: Install worker package
        working-directory: ./worker
        run: pip install .
      - name: Import smoke test
        working-directory: ./worker
        run: |
          python -c "
          import worker
          import worker.consumer
          import worker.pipeline
          import worker.pubmed_client
          import worker.parser
          import worker.filters
          import worker.db
          import worker.digest
          import worker.digest.scheduler
          import worker.digest.sender
          import worker.digest.builder
          import worker.digest.db as digest_db
          import worker.digest.renderer
          print('ok')
          "

  frontend:
    name: Frontend build + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: ./web
        run: npm ci
      - name: Typecheck + build
        working-directory: ./web
        run: npm run build
