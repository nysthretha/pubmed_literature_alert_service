[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pubmed-worker"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pika==1.3.2",
    "httpx==0.27.2",
    "lxml==5.3.0",
    "psycopg[binary]==3.2.3",
]

[project.scripts]
pubmed-worker = "pubmed_worker.main:main"

[tool.setuptools.packages.find]
where = ["src"]
